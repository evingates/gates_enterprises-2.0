<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard - Gates Enterprises</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-header {
      background-color: var(--dark-navy);
      padding: 32px 0;
      color: white;
      margin-bottom: 32px;
    }
    
    .panel {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 24px;
      margin-bottom: 32px;
    }
    
    .job-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .job-item {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .job-item:hover, .job-item.active {
      background: var(--page-bg);
      border-color: var(--primary-blue);
    }
    
    .job-item-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border-color); }
    th { color: var(--text-muted); font-weight: 500; font-size: 13px; }
    
    .status-select {
      padding: 6px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      font-size: 13px;
      font-family: var(--font-family);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <a href="/jobs.html" class="logo">
        <span class="logo-icon">✦</span> Gates Enterprises
      </a>
      <div class="nav-links">
        <a href="/jobs.html">View Board</a>
        <a href="/dashboard-employer.html" class="active">Dashboard</a>
      </div>
      <div class="nav-auth">
        <button onclick="logout()" class="btn btn-outline" style="padding: 6px 12px;">Log Out</button>
      </div>
    </div>
  </nav>

  <header class="dashboard-header">
    <div class="container flex justify-between items-center">
      <div>
        <h1 class="hero-headline" style="font-size: 28px; margin-bottom: 8px;">Employer Dashboard</h1>
        <p style="color: #94A3B8;" id="employerGreeting">Manage your postings and candidates.</p>
      </div>
      <!-- In a real app this would go to post-job.html, but we will focus on what was asked -->
      <a href="/post-job.html" class="btn btn-primary">Post New Job</a>
    </div>
  </header>

  <main class="container">
    <div class="flex gap-8">
      
      <!-- Left side: Job Postings -->
      <div class="w-full" style="flex: 1;">
        <div class="panel">
          <h2 class="section-header" style="font-size: 18px; margin-bottom: 16px;">My Postings</h2>
          <div id="jobsList" class="job-list">
            <!-- Jobs populated by JS -->
          </div>
          <div id="noJobsMsg" class="hidden text-muted text-center py-4">No jobs posted yet.</div>
        </div>
      </div>
      
      <!-- Right side: Applicants for selected job -->
      <div class="w-full" style="flex: 2;">
        <div class="panel" id="applicantsPanel" style="display: none;">
          <h2 class="section-header" style="font-size: 18px; margin-bottom: 16px;">
            Applicants for <span id="selectedJobTitle" style="color: var(--primary-blue);">Job</span>
          </h2>
          <table>
            <thead>
              <tr>
                <th>Applicant Name</th>
                <th>Email</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="applicantsBody">
              <!-- Applicants populated by JS -->
            </tbody>
          </table>
          <div id="noAppsMsg" class="hidden text-muted text-center mt-4">No applicants yet.</div>
        </div>
        
        <div id="selectJobPrompt" class="panel text-center text-muted" style="padding: 60px;">
          Select a job posting to view its applicants.
        </div>
      </div>
      
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard-employer.js"></script>
</body>
</html>
