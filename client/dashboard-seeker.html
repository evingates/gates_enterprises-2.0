<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seeker Dashboard - Gates Enterprises</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dashboard-header {
      background-color: var(--card-bg);
      padding: 32px 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 32px;
    }
    
    .table-container {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    
    th, td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }
    
    th {
      background-color: #F8FAFC;
      color: var(--text-dark);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    tr:last-child td {
      border-bottom: none;
    }
    
    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-applied { background: var(--badge-blue-bg); color: var(--badge-blue-text); }
    .status-interviewing { background: var(--badge-orange-bg); color: var(--badge-orange-text); }
    .status-offered { background: var(--badge-green-bg); color: var(--badge-green-text); }
    .status-rejected { background: #FEE2E2; color: #DC2626; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <a href="/jobs.html" class="logo">
        <span class="logo-icon">✦</span> Gates Enterprises
      </a>
      <div class="nav-links">
        <a href="/jobs.html">Find Jobs</a>
        <a href="/dashboard-seeker.html" class="active">My Applications</a>
      </div>
      <div class="nav-auth">
        <button onclick="logout()" class="btn btn-outline" style="padding: 6px 12px;">Log Out</button>
      </div>
    </div>
  </nav>

  <header class="dashboard-header">
    <div class="container flex justify-between items-center">
      <div>
        <h1 class="section-header" style="font-size: 28px; mb: 8px;">My Applications</h1>
        <p class="text-muted" id="userGreeting">Track your job applications.</p>
      </div>
      <a href="/jobs.html" class="btn btn-primary">Find More Jobs</a>
    </div>
  </header>

  <main class="container">
    <div class="table-container">
      <table id="applicationsTable">
        <thead>
          <tr>
            <th>Role</th>
            <th>Company</th>
            <th>Applied Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="applicationsBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
      <div id="noAppsMsg" class="hidden text-center text-muted" style="padding: 40px;">
        You haven't applied to any jobs yet.
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard-seeker.js"></script>
</body>
</html>
