<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs - Gates Enterprises</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Hero Section */
    .hero {
      background-color: var(--dark-navy);
      padding: 60px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .search-pill-container {
      max-width: 800px;
      margin: 40px auto 0;
      background: white;
      border-radius: var(--radius-pill);
      display: flex;
      padding: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    
    .search-input {
      flex: 1;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-family: var(--font-family);
      outline: none;
      background: transparent;
    }

    .search-divider {
      width: 1px;
      background: var(--border-color);
      margin: 10px 0;
    }
    
    .search-btn {
      border-radius: var(--radius-pill);
      padding: 12px 32px;
      font-size: 16px;
    }

    /* Main Layout */
    .main-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 32px;
      padding: 40px 0;
    }
    
    /* Sidebar */
    .sidebar-section {
      margin-bottom: 32px;
    }
    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-dark);
    }
    
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .checkbox-item input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary-blue);
      cursor: pointer;
    }
    
    .range-slider {
      width: 100%;
      accent-color: var(--primary-blue);
    }

    /* Job Grid */
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* Job Card specific */
    .card-header {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .company-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--badge-blue-bg);
      color: var(--primary-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .job-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 4px;
    }
    
    .company-name {
      font-size: 14px;
      color: var(--text-muted);
    }

    .badges-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .job-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }

    .job-salary {
      font-weight: 600;
      color: var(--text-dark);
    }

    .spinner {
      margin: 40px auto;
      width: 40px;
      height: 40px;
      border: 4px solid var(--border-color);
      border-top-color: var(--primary-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Sticky Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/jobs.html" class="logo">
        <span class="logo-icon">✦</span> Gates Enterprises
      </a>
      <div class="nav-links" id="navLinksCenter">
        <a href="/jobs.html" class="active">Find Jobs</a>
        <a href="#">Companies</a>
        <a href="#">About Us</a>
      </div>
      <div class="nav-auth" id="navAuthSection">
        <!-- Injected via JS based on auth state -->
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h1 class="hero-headline">Find your next dream job</h1>
      <p style="color: #94A3B8; font-size: 18px; margin-top: 12px;">Discover thousands of opportunities in tech, design, and more.</p>
      
      <div class="search-pill-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Job title, keywords, or company">
        <div class="search-divider"></div>
        <input type="text" id="locationInput" class="search-input" placeholder="City, state, or Remote">
        <button id="searchBtn" class="btn btn-primary search-btn">Search</button>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="container main-grid">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">Job Type</h3>
        <label class="checkbox-item"><input type="checkbox" class="filter-cb" value="Full-Time" data-type="type"> Full-Time</label>
        <label class="checkbox-item"><input type="checkbox" class="filter-cb" value="Part-Time" data-type="type"> Part-Time</label>
        <label class="checkbox-item"><input type="checkbox" class="filter-cb" value="Contract" data-type="type"> Contract</label>
      </div>
      
      <div class="sidebar-section">
        <h3 class="sidebar-title">Experience Level</h3>
        <label class="checkbox-item"><input type="checkbox" class="filter-cb" value="Entry Level" data-type="level"> Entry Level</label>
        <label class="checkbox-item"><input type="checkbox" class="filter-cb" value="Mid Level" data-type="level"> Mid Level</label>
        <label class="checkbox-item"><input type="checkbox" class="filter-cb" value="Senior Level" data-type="level"> Senior Level</label>
        <label class="checkbox-item"><input type="checkbox" class="filter-cb" value="Expert" data-type="level"> Expert</label>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">Salary Range</h3>
        <input type="range" id="salaryFilter" class="range-slider" min="0" max="250000" step="10000" value="0">
        <div class="flex justify-between mt-4 text-muted" style="font-size: 13px;">
          <span>$0+</span>
          <span id="salaryValDisplay">Any</span>
        </div>
      </div>
    </aside>

    <!-- Job Feed -->
    <section>
      <div class="flex justify-between items-center mb-4">
        <h2 class="section-header" id="jobsCountTitle">Latest Jobs</h2>
      </div>
      
      <div id="jobsSpinner" class="spinner"></div>
      
      <div id="jobsGrid" class="jobs-grid" style="display: none;">
        <!-- Job Cards injected dynamically -->
      </div>
      
      <div id="noJobsMsg" class="hidden text-center text-muted mt-4">
        <p>No jobs found matching your criteria.</p>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/jobs.js"></script>
</body>
</html>
