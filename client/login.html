<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gates Enterprises</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Specific styles for Auth Pages */
    body { margin: 0; display: flex; height: 100vh; overflow: hidden; }
    
    .auth-left {
      flex: 1;
      background-color: var(--dark-navy);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    .auth-tagline {
      font-size: 40px;
      font-weight: 700;
      z-index: 10;
      text-align: center;
      max-width: 400px;
      line-height: 1.2;
    }
    
    /* CSS Abstract Shapes */
    .shape-1 {
      position: absolute; width: 400px; height: 400px; 
      background: radial-gradient(circle, rgba(37,99,235,0.4) 0%, rgba(37,99,235,0) 70%);
      border-radius: 50%; top: -100px; left: -100px;
    }
    .shape-2 {
      position: absolute; width: 500px; height: 500px; 
      background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, rgba(124,58,237,0) 70%);
      border-radius: 50%; bottom: -150px; right: -150px;
    }

    .auth-right {
      flex: 1;
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .auth-form-container {
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .role-toggle {
      display: flex;
      background: var(--page-bg);
      border-radius: var(--radius-pill);
      padding: 4px;
      margin-bottom: 24px;
    }

    .role-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.3s;
    }

    .role-btn.active {
      background: var(--primary-blue);
      color: white;
      box-shadow: 0 2px 10px rgba(37,99,235,0.3);
    }
    
    .error-msg {
      color: #ef4444;
      font-size: 13px;
      margin-top: -10px;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-left hidden-mobile">
    <div class="shape-1"></div>
    <div class="shape-2"></div>
    <h1 class="auth-tagline">Find Your Dream Job Here ✦</h1>
  </div>

  <div class="auth-right">
    <div class="auth-form-container">
      <h2 class="section-header" style="margin-bottom: 8px;">Welcome Back</h2>
      <p class="text-muted" style="margin-bottom: 32px;">Please enter your details to sign in.</p>

      <!-- Pill Toggle -->
      <div class="role-toggle" id="loginRoleToggle">
        <button type="button" class="role-btn active" data-role="seeker">Job Seeker</button>
        <button type="button" class="role-btn" data-role="employer">Employer</button>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <label class="input-label" for="email">Email</label>
          <input type="email" id="email" class="input-field" placeholder="✉️  you@example.com" required>
        </div>
        
        <div class="input-group">
          <label class="input-label" for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="🔒  ••••••••" required>
        </div>
        
        <div id="errorMessage" class="error-msg">Invalid credentials</div>

        <button type="submit" class="btn btn-primary w-full" style="padding: 12px; margin-top: 10px; font-size: 15px;">Sign In</button>
      </form>

      <p class="text-center" style="margin-top: 24px; font-size: 14px;">
        Don't have an account? <a href="/register.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Sign up</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
