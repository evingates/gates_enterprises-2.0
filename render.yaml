services:
  # Node.js backend & frontend server
  - type: web
    name: gates-enterprise-server
    env: node
    buildCommand: npm run install-all
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gates-enterprise-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true

databases:
  # PostgreSQL database
  - name: gates-enterprise-db
    databaseName: gates_db
    user: gates_admin
    plan: free
